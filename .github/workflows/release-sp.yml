name: release-sp

on:
  push:
    tags:
      - "v*-sp"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 1.17.20-sp"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-linux-x64:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          case "$version" in
            [0-9]*.[0-9]*.[0-9]*-sp) ;;
            *)
              echo "Invalid release version: $version"
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
        run: ./packages/opencode/script/build.ts --single

      - name: Verify binary version
        shell: bash
        run: |
          actual="$(./packages/opencode/dist/opencode-linux-x64/bin/opencode --version)"
          test "$actual" = "${{ steps.version.outputs.version }}"

      - name: Package release assets
        shell: bash
        run: |
          raw_asset="opencode-linux-x64-${{ steps.version.outputs.version }}.bin"
          tar_asset="opencode-linux-x64-${{ steps.version.outputs.version }}.tar.gz"
          cp packages/opencode/dist/opencode-linux-x64/bin/opencode "$raw_asset"
          chmod +x "$raw_asset"
          sha256sum "$raw_asset" > "$raw_asset.sha256"
          tar -czf "$tar_asset" -C packages/opencode/dist/opencode-linux-x64/bin opencode
          sha256sum "$tar_asset" > "$tar_asset.sha256"

      - name: Create or update release
        shell: bash
        run: |
          gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --notes "OpenCode fork release for runtime system prompt support."
          gh release upload "${{ steps.version.outputs.tag }}" \
            "opencode-linux-x64-${{ steps.version.outputs.version }}.bin" \
            "opencode-linux-x64-${{ steps.version.outputs.version }}.bin.sha256" \
            "opencode-linux-x64-${{ steps.version.outputs.version }}.tar.gz" \
            "opencode-linux-x64-${{ steps.version.outputs.version }}.tar.gz.sha256" \
            --clobber
